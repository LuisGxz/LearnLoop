spring.application.name=learnloop-api

# ── Datasource (MySQL) ────────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/learnloop?createDatabaseIfNotExist=true&serverTimezone=UTC}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:root}

# ── JPA / Hibernate ───────────────────────────────────────────────────
# Hibernate manages the schema from the entity model (relations + indexes are
# declared via JPA annotations). Switch to validate + Flyway for prod hardening.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=false

# ── App config ────────────────────────────────────────────────────────
# JWT signing secret (Base64, >= 32 bytes). Override in prod via env.
learnloop.jwt.secret=${JWT_SECRET:bGVhcm5sb29wLWRldi1zZWNyZXQtY2hhbmdlLW1lLWluLXByb2QtMDEyMzQ1Njc4OQ==}
learnloop.jwt.expiration-ms=${JWT_EXPIRATION_MS:604800000}
learnloop.seed.enabled=${SEED_ENABLED:true}

# CORS origins for the Angular client (comma-separated)
learnloop.cors.allowed-origins=${CORS_ORIGINS:http://localhost:4200}

server.port=${PORT:8080}
