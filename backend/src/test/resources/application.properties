# Tests run against in-memory H2 (MySQL mode) — no external DB needed (CI-safe).
spring.datasource.url=jdbc:h2:mem:learnloop;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop

learnloop.seed.enabled=false
learnloop.jwt.secret=dGVzdC1zZWNyZXQtdGVzdC1zZWNyZXQtdGVzdC1zZWNyZXQtMDEyMzQ1Njc4OQ==
learnloop.jwt.expiration-ms=3600000
learnloop.cors.allowed-origins=http://localhost:4200
